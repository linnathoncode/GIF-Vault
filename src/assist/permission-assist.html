<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grant Access</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #e0e2db;
      --panel: rgba(255, 255, 255, 0.88);
      --text: #2e3532;
      --muted: #55615d;
      --accent: #8b2635;
      --accent-strong: #8b2635;
      --border: rgba(46, 53, 50, 0.14);
      --shadow: 0 18px 40px rgba(46, 53, 50, 0.18);
      --callout-bg: rgba(139, 38, 53, 0.08);
      --callout-border: rgba(139, 38, 53, 0.16);
      --ok: #0f766e;
      --secondary-bg: rgba(255, 255, 255, 0.42);
    }

    [data-theme="dark"] {
      --bg: #232b28;
      --panel: rgba(39, 47, 44, 0.96);
      --text: #e0e2db;
      --muted: #c8d0cb;
      --accent: #d9ab34;
      --accent-strong: #f2bd3c;
      --border: rgba(224, 226, 219, 0.16);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
      --callout-bg: rgba(224, 226, 219, 0.06);
      --callout-border: rgba(224, 226, 219, 0.14);
      --ok: #6dd3b6;
      --secondary-bg: rgba(224, 226, 219, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font: 14px/1.45 Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(139, 38, 53, 0.10), transparent 42%),
        linear-gradient(180deg, rgba(46, 53, 50, 0.10), transparent 28%),
        var(--bg);
    }

    body {
      padding: 20px;
    }

    .wrap {
      width: min(420px, 100%);
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.1;
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .reason, .origins {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--callout-bg);
      border: 1px solid var(--callout-border);
      overflow-wrap: anywhere;
    }

    .origins ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .status {
      min-height: 20px;
      margin: 0 0 14px;
      color: var(--muted);
    }

    .status.ok {
      color: var(--ok);
    }

    .status.error {
      color: var(--accent);
    }

    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:disabled {
      cursor: default;
      opacity: 0.65;
      transform: none;
    }

    .primary {
      background: var(--accent-strong);
      color: #fffdf6;
      font-weight: 700;
    }

    .secondary {
      background: var(--secondary-bg);
      border-color: var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <h1>Grant Site Access</h1>
      <p>This import needs temporary site access before GIF Vault can fetch the media.</p>
      <div id="reason" class="reason"></div>
      <div id="origins" class="origins" hidden>
        <strong>Requested hosts</strong>
        <ul id="originsList"></ul>
      </div>
      <div id="status" class="status">Checking required access...</div>
      <div class="actions">
        <button id="grantBtn" class="primary" disabled>Grant &amp; Import</button>
        <button id="cancelBtn" class="secondary" type="button">Cancel</button>
      </div>
    </section>
  </main>
  <script type="module" src="./permission-assist.js"></script>
</body>
</html>
