<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Vault Logs</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d1d5db;
      --ok: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #e5f7f4, var(--bg) 35%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .wrap {
      width: min(980px, 96vw);
      margin: 0;
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 18px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .status.ok {
      color: var(--ok);
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--line);
      background: #f8fafc;
      border-radius: 8px;
      font-size: 13px;
      padding: 7px 10px;
      cursor: pointer;
    }

    .logs {
      max-height: 72vh;
      overflow: auto;
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fcfcfd;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel header">
      <h1 class="title">GIF Vault Debug Logs</h1>
      <div class="actions">
        <button id="refreshBtn" class="btn" type="button">Refresh</button>
        <button id="clearBtn" class="btn" type="button">Clear</button>
      </div>
    </section>

    <section class="panel">
      <div id="status" class="status">Loading logs...</div>
      <div id="logs" class="logs">Loading...</div>
    </section>
  </main>

  <script type="module" src="logs.js"></script>
</body>
</html>
