<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Vault</title>
  <style>
    :root {
      --input-pad-x: 10px;
      --input-border: 1px;
      --bg: #e0e2db;
      --bg-top: #cfd6d2;
      --card: #f2f3ee;
      --text: #2e3532;
      --muted: #4b5450;
      --line: #a7aba4;
      --danger: #8b2635;
      --ok: #2e3532;
      --accent-bg: #e0e2db;
      --accent-line: #8b2635;
      --accent-text: #8b2635;
      --scrollbar-thumb: #8b2635;
      --scrollbar-track: #cfd6d2;
    }

    :root[data-theme="dark"] {
      --bg: #2e3532;
      --bg-top: #3a4541;
      --card: #39413d;
      --text: #e0e2db;
      --muted: #c6c8c2;
      --line: #616a65;
      --danger: #e0e2db;
      --ok: #e0e2db;
      --accent-bg: #2e3532;
      --accent-line: #8b2635;
      --accent-text: #e0e2db;
      --scrollbar-thumb: #8b2635;
      --scrollbar-track: #3a4541;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 520px;
      min-width: 520px;
      max-width: 520px;
      height: 600px;
      min-height: 600px;
      max-height: 600px;
      overflow: hidden;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, var(--bg-top), var(--bg) 58%);
      color: var(--text);
    }

    .container {
      height: 100%;
      min-height: 0;
      overflow: hidden;
      padding: 10px;
      display: grid;
      gap: 8px;
      grid-template-rows: auto auto auto 1fr;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
    }

    .import-panel {
      display: grid;
      align-content: start;
      row-gap: 8px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .brand-logo {
      width: 26px;
      height: 26px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title { margin: 0; font-size: 16px; }
    .count { font-size: 12px; color: var(--muted); }
    .status {
      font-size: 12px;
      color: var(--muted);
      padding: 0 calc(var(--input-pad-x) + var(--input-border));
      min-height: 18px;
      display: flex;
      align-items: center;
      margin: 0;
    }

    .danger-btn {
      border: 1px solid #8b2635;
      background: #8b2635;
      color: #e0e2db;
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .icon-btn {
      border: 1px solid var(--line);
      background: var(--accent-bg);
      border-radius: 8px;
      width: 38px;
      height: 38px;
      padding: 0;
      font-size: 21px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn.logs-btn {
      background: #8b2635;
      border-color: #8b2635;
      color: #e0e2db;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
    }

    .import-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .import-row.single {
      grid-template-columns: minmax(0, 1fr);
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px var(--input-pad-x);
      font-size: 12px;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--accent-bg);
      border-radius: 8px;
      font-size: 12px;
      padding: 7px 10px;
      cursor: pointer;
      color: var(--text);
    }

    .btn.primary {
      background: var(--accent-bg);
      border-color: var(--accent-line);
      color: var(--accent-text);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .tab-pager {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr)) auto auto auto;
      align-items: center;
      gap: 8px;
    }

    .page-indicator {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }

    .tab-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent-line);
      color: var(--accent-text);
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: minmax(164px, auto);
      gap: 8px;
      align-content: start;
      min-height: 0;
      max-height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      padding-right: 2px;
      padding-bottom: 12px;
    }

    .grid::-webkit-scrollbar {
      width: 10px;
    }

    .grid::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 999px;
    }

    .grid::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 999px;
      border: 2px solid var(--scrollbar-track);
    }

    .item {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 62px auto;
      min-height: 164px;
    }

    .thumb {
      width: 100%;
      height: 62px;
      object-fit: cover;
      background: #e5e7eb;
    }

    .meta { padding: 6px 6px 8px; display: grid; gap: 4px; }

    .url {
      font-size: 10px;
      color: var(--muted);
      line-height: 1.15;
      word-break: break-all;
      max-height: 24px;
      overflow: hidden;
    }

    .size {
      font-size: 10px;
      color: var(--text);
      font-weight: 600;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .name {
      font-size: 10px;
      font-weight: 700;
      min-width: 0;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .name-btn {
      border: 1px solid var(--line);
      background: var(--accent-bg);
      border-radius: 6px;
      font-size: 10px;
      padding: 1px 5px;
      cursor: pointer;
      color: var(--text);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
    }

    .actions .btn {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 5px 3px;
      font-size: 15px;
      font-weight: 900;
      min-height: 30px;
      line-height: 1;
    }

    .btn.danger {
      background: #8b2635;
      border-color: #8b2635;
      color: #e0e2db;
    }

    .btn.favorite-active {
      background: #f4b400;
      border-color: #f4b400;
      color: #2e3532;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      text-align: center;
      padding: 24px 12px;
      font-size: 13px;
      background: var(--card);
    }

    .ok { color: var(--ok); }
  </style>
</head>
<body>
  <main class="container">
    <section class="panel header">
      <div class="brand">
        <img id="brandLogo" class="brand-logo" src="../assets/icons/icon-dark-128.png" alt="GIF Vault logo" />
        <div>
        <h1 class="title">GIF Vault</h1>
        <div id="count" class="count">0 saved</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="themeToggleBtn" class="icon-btn" type="button" title="Toggle Theme" aria-label="Toggle Theme">&#9790;</button>
        <button id="openLogsBtn" class="icon-btn logs-btn" type="button" title="Open Logs" aria-label="Open Logs">&#128203;</button>
        <button id="clearAllBtn" class="danger-btn" type="button">Clear all</button>
      </div>
    </section>

    <section class="panel import-panel">
      <div class="import-row">
        <input id="importInput" class="input" type="url" placeholder="Paste GIF / MP4 / tweet URL" />
        <button id="importBtn" class="btn primary" type="button">Import</button>
      </div>
      <div class="import-row single">
        <input id="searchInput" class="input" type="search" placeholder="Search by name or source" />
      </div>
      <div id="status" class="status" aria-live="polite"></div>
    </section>

    <section class="panel tab-pager">
      <button id="tabAllBtn" class="btn tab-btn active" type="button">All</button>
      <button id="tabFavoritesBtn" class="btn tab-btn" type="button">Favorites</button>
      <button id="prevPageBtn" class="btn" type="button" aria-label="Previous page">Prev</button>
      <div id="pageIndicator" class="page-indicator">Page 1 / 1</div>
      <button id="nextPageBtn" class="btn" type="button" aria-label="Next page">Next</button>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
