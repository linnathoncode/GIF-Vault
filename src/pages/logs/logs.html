<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Vault Logs</title>
  <link rel="stylesheet" href="logs.css">
</head>
<body>
  <main class="wrap">
    <section class="panel header">
      <h1 class="title">GIF Vault Debug Logs</h1>
      <div class="actions">
        <button id="themeToggleBtn" class="icon-btn" type="button" title="Toggle Theme" aria-label="Toggle Theme">&#9790;</button>
        <button id="refreshBtn" class="btn" type="button">Refresh</button>
        <button id="clearBtn" class="btn" type="button">Clear</button>
      </div>
    </section>

    <section class="panel">
      <div id="status" class="status">Loading logs...</div>
    </section>

    <section class="panel">
      <div id="storageUsage" class="status">Storage: calculating...</div>
    </section>

    <section class="panel logs-panel">
      <div id="logs" class="logs">Loading...</div>
    </section>
  </main>

  <script type="module" src="logs.js"></script>
</body>
</html>
