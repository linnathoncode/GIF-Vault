<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="container">
    <section class="panel header">
      <div class="brand">
        <img id="brandLogo" class="brand-logo" src="../../assets/icons/icon-dark-128.png" alt="GIF Vault logo" />
        <div>
        <h1 class="title">GIF Vault</h1>
        <div id="count" class="count">0 saved</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="themeToggleBtn" class="icon-btn" type="button" title="Toggle Theme" aria-label="Toggle Theme">&#9790;</button>
        <button id="openSettingsBtn" class="icon-btn" type="button" title="Open Settings" aria-label="Open Settings">&#9881;</button>
        <button id="openLogsBtn" class="icon-btn logs-btn" type="button" title="Open Logs" aria-label="Open Logs">
          <svg class="logs-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 4h8l4 4v12H7z" />
            <path d="M15 4v4h4" />
            <path d="M10 12h6M10 15h6M10 18h4" />
          </svg>
        </button>
        <button id="clearAllBtn" class="danger-btn" type="button">Clear all</button>
      </div>
    </section>

    <section class="panel import-panel">
      <div class="import-row">
        <input id="importInput" class="input" type="url" placeholder="Paste GIF / MP4 / tweet URL" />
        <button id="importBtn" class="btn primary" type="button">Import</button>
      </div>
      <div class="import-row single">
        <input id="searchInput" class="input" type="search" placeholder="Search by name or source" />
      </div>
      <div id="status" class="status" aria-live="polite">
        <div id="progressTrack" class="progress-track">
          <div id="progressBar" class="progress-bar"></div>
          <div id="progressLabel" class="progress-label"></div>
        </div>
      </div>
    </section>

    <section class="panel tab-pager">
      <button id="tabAllBtn" class="btn tab-btn active" type="button">All</button>
      <button id="tabFavoritesBtn" class="btn tab-btn" type="button">Favorites</button>
      <button id="prevPageBtn" class="btn" type="button" aria-label="Previous page">Prev</button>
      <div id="pageIndicator" class="page-indicator">Page 1 / 1</div>
      <button id="nextPageBtn" class="btn" type="button" aria-label="Next page">Next</button>
    </section>

    <section id="grid" class="grid" aria-live="polite"></section>
  </main>
  <div id="hoverPreview" class="hover-preview" aria-hidden="true">
    <img id="hoverPreviewImg" class="hover-preview-img" alt="" />
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
